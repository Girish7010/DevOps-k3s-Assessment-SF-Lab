apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.2.1
    chart: kube-prometheus-stack
    helm:
      values: |
        grafana:
          enabled: true
          adminPassword: admin
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki:3100
            - name: Tempo
              type: tempo
              access: proxy
              url: http://tempo:3100
        prometheus:
          prometheusSpec:
            scrapeInterval: 15s
            evaluationInterval: 15s
            enableFeatures:
              - exemplar-storage
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
